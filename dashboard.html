<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FraudGuard — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #1a1a28;
      --surface2: #222235;
      --accent: #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.1);
      --success: #00c853;
      --danger: #ff3b30;
      --warning: #ffb020;
      --text: #f0f0f5;
      --muted: #888899;
      --border: rgba(255,255,255,0.07);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* Topbar */
    .topbar {
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 0.65rem; text-decoration: none; color: var(--text); }
    .logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; color: #0a0a0f; }
    .logo-text { font-weight: 600; font-size: 0.95rem; }
    .logo-text span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .live-badge {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 600; color: var(--success);
      letter-spacing: 0.05em;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--success);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .clear-btn {
      padding: 0.45rem 1rem;
      background: rgba(255,59,48,0.12); border: 1px solid rgba(255,59,48,0.25);
      color: var(--danger); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .clear-btn:hover { background: rgba(255,59,48,0.22); }

    /* Layout */
    .layout { display: flex; flex: 1; min-height: 0; }
    .main { flex: 1; padding: 2rem; overflow-y: auto; max-width: 1200px; margin: 0 auto; width: 100%; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr 1fr; } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(0,212,255,0.2); }
    .stat-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
    .stat-value { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    .stat-value.blue { color: var(--accent); }
    .stat-value.yellow { color: var(--warning); }
    .stat-value.red { color: var(--danger); }
    .stat-value.green { color: var(--success); }

    /* Feed */
    .feed-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .feed-title { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }

    .feed { display: flex; flex-direction: column; gap: 0.85rem; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 5rem 2rem;
      text-align: center; color: var(--muted);
      border: 1px dashed var(--border); border-radius: 16px;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }
    .empty-state strong { color: var(--text); }

    /* Transaction card */
    .tx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      animation: slideIn 0.3s ease;
      transition: border-color 0.2s;
    }
    .tx-card:hover { border-color: rgba(255,255,255,0.12); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tx-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 1rem; gap: 1rem;
    }
    .tx-left { display: flex; align-items: center; gap: 0.85rem; }
    .tx-device-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--surface2); display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem; flex-shrink: 0;
    }
    .tx-device { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.15rem; }
    .tx-cardholder { font-size: 0.9rem; font-weight: 600; }
    .tx-card-num { font-size: 0.73rem; color: var(--muted); }

    /* Status badge */
    .badge {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 0.25rem 0.7rem; border-radius: 100px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-approved { background: rgba(0,200,83,0.15); color: var(--success); border: 1px solid rgba(0,200,83,0.25); }
    .badge-flagged { background: rgba(255,176,32,0.15); color: var(--warning); border: 1px solid rgba(255,176,32,0.25); }
    .badge-confirmed { background: rgba(0,200,83,0.15); color: var(--success); border: 1px solid rgba(0,200,83,0.3); }
    .badge-blocked { background: rgba(255,59,48,0.15); color: var(--danger); border: 1px solid rgba(255,59,48,0.25); }

    .tx-amount-row {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .tx-amount { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.01em; }
    .tx-merchant { font-size: 0.8rem; color: var(--muted); }

    /* Score bar */
    .score-row { margin-bottom: 1rem; }
    .score-label-row {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: var(--muted); margin-bottom: 0.35rem;
    }
    .score-val { font-weight: 600; }
    .score-track {
      height: 5px; background: var(--surface2); border-radius: 100px; overflow: hidden;
    }
    .score-fill {
      height: 100%; border-radius: 100px;
      transition: width 0.5s ease;
    }
    .score-fill.high { background: var(--danger); }
    .score-fill.low { background: var(--success); }

    /* Meta grid */
    .tx-meta {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem;
    }
    @media (max-width: 600px) { .tx-meta { grid-template-columns: 1fr 1fr; } }
    .meta-item { }
    .meta-key { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.2rem; }
    .meta-val { font-size: 0.75rem; color: var(--text); font-family: monospace; }

    .tx-footer {
      display: flex; justify-content: flex-end;
      margin-top: 0.85rem; padding-top: 0.85rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem; color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="logo" href="index.html">
      <div class="logo-mark">FG</div>
      <span class="logo-text"><span>Fraud</span>Guard</span>
    </a>
    <div class="topbar-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>
  </header>

  <div class="layout">
    <main class="main">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Transactions</div>
          <div class="stat-value blue" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Flagged</div>
          <div class="stat-value yellow" id="statFlagged">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Blocked</div>
          <div class="stat-value red" id="statBlocked">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Approval Rate</div>
          <div class="stat-value green" id="statApproval">—</div>
        </div>
      </div>

      <!-- Feed -->
      <div class="feed-header">
        <span class="feed-title">Transaction Feed</span>
      </div>

      <div id="feed">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">📡</div>
          <p><strong>Waiting for transactions…</strong><br />
          Open the device tabs and click Pay to see live updates here.</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const channel = new BroadcastChannel('fraudguard');
    const transactions = new Map(); // txId → { tx, cardEl }

    function getDeviceIcon(device_id) {
      const icons = {
        'owner-main': '📱',
        'fraudster': '🕵️',
        'owner-secondary': '💳'
      };
      return icons[device_id] || '📟';
    }

    function formatAmount(n) {
      return '₦' + n.toLocaleString('en-NG');
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function badgeClass(status) {
      const map = {
        approved: 'badge-approved',
        flagged: 'badge-flagged',
        confirmed: 'badge-confirmed',
        blocked: 'badge-blocked'
      };
      return map[status] || 'badge-flagged';
    }

    function badgeLabel(status) {
      const map = {
        approved: '✓ Approved',
        flagged: '⚡ Flagged',
        confirmed: '✓ Confirmed',
        blocked: '✗ Blocked'
      };
      return map[status] || status;
    }

    function buildCard(tx) {
      const card = document.createElement('div');
      card.className = 'tx-card';
      card.id = `card-${tx.id}`;
      const isHigh = tx.fraud_score >= 0.68;

      card.innerHTML = `
        <div class="tx-top">
          <div class="tx-left">
            <div class="tx-device-icon">${getDeviceIcon(tx.device_id)}</div>
            <div>
              <div class="tx-device">${tx.device_label}</div>
              <div class="tx-cardholder">${tx.cardholder}</div>
              <div class="tx-card-num">Card ••••4829</div>
            </div>
          </div>
          <span class="badge ${badgeClass(tx.status)}" id="badge-${tx.id}">${badgeLabel(tx.status)}</span>
        </div>

        <div class="tx-amount-row">
          <span class="tx-amount">${formatAmount(tx.amount)}</span>
          <span class="tx-merchant">${tx.merchant}</span>
        </div>

        <div class="score-row">
          <div class="score-label-row">
            <span>Fraud Score</span>
            <span class="score-val" id="scoreVal-${tx.id}">${tx.fraud_score.toFixed(4)}</span>
          </div>
          <div class="score-track">
            <div class="score-fill ${isHigh ? 'high' : 'low'}" style="width: ${(tx.fraud_score * 100).toFixed(1)}%"></div>
          </div>
        </div>

        <div class="tx-meta">
          <div class="meta-item">
            <div class="meta-key">IP Address</div>
            <div class="meta-val">${tx.ip_address}</div>
          </div>
          <div class="meta-item">
            <div class="meta-key">Location</div>
            <div class="meta-val">${tx.location}</div>
          </div>
          <div class="meta-item">
            <div class="meta-key">Device FP</div>
            <div class="meta-val">${tx.device_fingerprint}</div>
          </div>
        </div>

        <div class="tx-footer">
          <span>${formatTime(tx.timestamp)}</span>
        </div>
      `;
      return card;
    }

    function updateStats() {
      const all = [...transactions.values()].map(v => v.tx);
      const total = all.length;
      const flagged = all.filter(t => t.status === 'flagged').length;
      const blocked = all.filter(t => t.status === 'blocked').length;
      const approved = all.filter(t => t.status === 'approved' || t.status === 'confirmed').length;
      const rate = total > 0 ? Math.round((approved / total) * 100) + '%' : '—';

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statFlagged').textContent = flagged;
      document.getElementById('statBlocked').textContent = blocked;
      document.getElementById('statApproval').textContent = rate;
    }

    function addTransaction(tx) {
      const emptyState = document.getElementById('emptyState');
      if (emptyState) emptyState.remove();

      const card = buildCard(tx);
      const feed = document.getElementById('feed');
      feed.insertBefore(card, feed.firstChild);
      transactions.set(tx.id, { tx, card });
      updateStats();
    }

    function updateTransaction(txId, status, ownerResponse) {
      const entry = transactions.get(txId);
      if (!entry) return;

      entry.tx.status = status;

      const badge = document.getElementById(`badge-${txId}`);
      if (badge) {
        badge.className = `badge ${badgeClass(status)}`;
        badge.textContent = badgeLabel(status);
      }

      // Pulse the card to highlight the update
      entry.card.style.transition = 'border-color 0.15s';
      const borderColor = status === 'blocked' ? 'rgba(255,59,48,0.4)' :
                          status === 'confirmed' ? 'rgba(0,200,83,0.4)' : 'rgba(0,212,255,0.3)';
      entry.card.style.borderColor = borderColor;
      setTimeout(() => { entry.card.style.borderColor = ''; }, 1500);

      updateStats();
    }

    function clearAll() {
      channel.postMessage({ type: 'reset-all' });
      wipeLocal();
    }

    function wipeLocal() {
      transactions.clear();
      const feed = document.getElementById('feed');
      feed.innerHTML = `
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">📡</div>
          <p><strong>Waiting for transactions…</strong><br />
          Open the device tabs and click Pay to see live updates here.</p>
        </div>
      `;
      updateStats();
    }

    channel.onmessage = (e) => {
      const { type } = e.data;
      if (type === 'tx-new') {
        addTransaction(e.data.tx);
      }
      if (type === 'tx-update') {
        updateTransaction(e.data.txId, e.data.status, e.data.owner_response);
      }
      if (type === 'reset-all') {
        wipeLocal();
      }
    };
  </script>
</body>
</html>
