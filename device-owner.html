<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FraudGuard — Owner's Device</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #1a1a28;
      --surface2: #222235;
      --accent: #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.12);
      --success: #00c853;
      --danger: #ff3b30;
      --warning: #ffb020;
      --text: #f0f0f5;
      --muted: #888899;
      --border: rgba(255,255,255,0.07);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: var(--text); }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.65rem; color: #0a0a0f;
    }
    .logo-text { font-weight: 600; font-size: 0.9rem; }
    .logo-text span { color: var(--accent); }
    .device-tag {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(0,200,83,0.15); color: var(--success);
      border: 1px solid rgba(0,200,83,0.25);
      padding: 0.25rem 0.7rem; border-radius: 100px;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* Phone frame */
    .phone {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      width: 100%;
      max-width: 380px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .phone-header {
      background: var(--surface2);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .ph-title { font-size: 0.8rem; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .ph-status {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.7rem; color: var(--success);
    }
    .ph-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

    .phone-body { padding: 1.75rem 1.5rem; }

    .merchant-info {
      text-align: center;
      margin-bottom: 1.75rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .merchant-logo {
      width: 56px; height: 56px;
      background: var(--surface2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 0.85rem;
    }
    .merchant-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .merchant-sub { font-size: 0.78rem; color: var(--muted); }

    .amount-block {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .amount-label { font-size: 0.72rem; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.4rem; }
    .amount-value { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; }

    .card-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .card-left { display: flex; align-items: center; gap: 0.7rem; }
    .card-chip { font-size: 1.1rem; }
    .card-num { font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; }
    .card-type { font-size: 0.7rem; color: var(--muted); }
    .card-brand { font-size: 0.72rem; color: var(--muted); font-weight: 600; }

    .pay-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .pay-btn:hover { opacity: 0.88; }
    .pay-btn:active { transform: scale(0.98); }
    .pay-btn:disabled { opacity: 0.4; cursor: default; }

    /* State overlays */
    .state-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem 1.5rem;
    }
    .state-overlay.active { display: flex; }

    .state-icon { font-size: 3rem; margin-bottom: 1rem; }
    .state-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.5rem; }
    .state-sub { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    .state-meta {
      margin-top: 1rem;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: monospace;
    }

    .reset-btn {
      margin-top: 1.25rem;
      padding: 0.6rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-backdrop.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid rgba(255,176,32,0.35);
      border-radius: 20px;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-icon { font-size: 2rem; margin-bottom: 0.85rem; text-align: center; }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.6rem; line-height: 1.35; }
    .modal-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.55; margin-bottom: 1.5rem; }

    .modal-timer {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .timer-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,176,32,0.1);
      border: 2px solid var(--warning);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--warning);
    }
    .timer-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; }

    .modal-actions { display: flex; gap: 0.75rem; }
    .btn-approve {
      flex: 1; padding: 0.8rem;
      background: var(--success);
      color: #0a0a0f;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-approve:hover { opacity: 0.85; }
    .btn-deny {
      flex: 1; padding: 0.8rem;
      background: rgba(255,59,48,0.15);
      color: var(--danger);
      border: 1px solid rgba(255,59,48,0.3);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-deny:hover { background: rgba(255,59,48,0.25); }

    .nav-back {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .nav-back a { color: var(--accent); text-decoration: none; }
    .nav-back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="logo" href="index.html">
      <div class="logo-mark">FG</div>
      <span class="logo-text"><span>Fraud</span>Guard</span>
    </a>
    <span class="device-tag">Owner's Device</span>
  </header>

  <main class="page">
    <div class="phone">
      <div class="phone-header">
        <span class="ph-title">Angelo's iPhone</span>
        <span class="ph-status">Secure</span>
      </div>

      <!-- Default checkout state -->
      <div id="checkout" class="phone-body">
        <div class="merchant-info">
          <div class="merchant-logo">🏪</div>
          <div class="merchant-name">Emunah Store</div>
          <div class="merchant-sub">Ikeja, Lagos · Nigeria</div>
        </div>
        <div class="amount-block">
          <div class="amount-label">Amount Due</div>
          <div class="amount-value">₦48,375</div>
        </div>
        <div class="card-row">
          <div class="card-left">
            <span class="card-chip">💳</span>
            <div>
              <div class="card-num">•••• •••• •••• 4829</div>
              <div class="card-type">Angelo M. · Visa Debit</div>
            </div>
          </div>
          <span class="card-brand">VISA</span>
        </div>
        <button class="pay-btn" id="payBtn" onclick="handlePay()">Pay ₦48,375</button>
      </div>

      <!-- Success state -->
      <div id="stateSuccess" class="state-overlay">
        <div class="state-icon">✅</div>
        <div class="state-title" style="color: var(--success);">Payment Successful</div>
        <div class="state-sub">₦48,375 to Emunah Store<br />Transaction verified and approved.</div>
        <div class="state-meta" id="successMeta"></div>
        <button class="reset-btn" onclick="resetPage()">New Transaction</button>
      </div>
    </div>

    <p class="nav-back">← <a href="index.html">Back to simulation home</a></p>
  </main>

  <!-- Modal overlay -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-icon" id="modalIcon">⚠️</div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-timer">
        <div class="timer-circle" id="timerCount">6</div>
        <div class="timer-label">Seconds to auto-deny</div>
      </div>
      <div class="modal-actions">
        <button class="btn-approve" onclick="handleDecision('approved')">YES — Approve</button>
        <button class="btn-deny" onclick="handleDecision('denied')">NO — Deny</button>
      </div>
    </div>
  </div>

  <script>
    const channel = new BroadcastChannel('fraudguard');
    let currentTxId = null;
    let timerInterval = null;
    let pendingVerify = null;

    function generateId() {
      return 'tx-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
    }

    function randomBetween(min, max) {
      return +(Math.random() * (max - min) + min).toFixed(4);
    }

    function handlePay() {
      const txId = generateId();
      currentTxId = txId;
      const score = randomBetween(0.05, 0.18);

      const tx = {
        id: txId,
        device_id: 'owner-main',
        device_label: "Owner's Main Device",
        cardholder: 'Angelo M.',
        amount: 48375,
        merchant: 'Emunah Store',
        status: 'approved',
        fraud_score: score,
        ip_address: '197.211.58.44',
        location: 'Lagos, Nigeria',
        device_fingerprint: 'a3f9b2c1-4827',
        timestamp: new Date().toISOString()
      };

      channel.postMessage({ type: 'tx-new', tx });

      // Show success
      document.getElementById('checkout').style.display = 'none';
      document.getElementById('stateSuccess').classList.add('active');
      document.getElementById('successMeta').textContent =
        `TX: ${txId} · Score: ${score} · ${new Date().toLocaleTimeString()}`;
    }

    function showModal(verifyData) {
      pendingVerify = verifyData;
      const { txId, source, amount, device_label } = verifyData;

      document.getElementById('modalIcon').textContent = source === 'fraudster' ? '⚠️' : '📱';
      document.getElementById('modalTitle').textContent =
        source === 'fraudster'
          ? 'Unusual Transaction Detected'
          : 'Transaction on Secondary Device';
      document.getElementById('modalDesc').textContent =
        source === 'fraudster'
          ? `${amount} at Emunah from an unrecognized device. Was this you?`
          : `A transaction of ${amount} at Emunah is being made from your secondary device. Approve?`;

      document.getElementById('modalBackdrop').classList.add('active');
      startTimer(txId, 6);
    }

    function startTimer(txId, seconds) {
      let remaining = seconds;
      document.getElementById('timerCount').textContent = remaining;
      timerInterval = setInterval(() => {
        remaining--;
        document.getElementById('timerCount').textContent = remaining;
        if (remaining <= 0) {
          clearInterval(timerInterval);
          handleDecision('denied', 'timeout');
        }
      }, 1000);
    }

    function handleDecision(decision, reason) {
      clearInterval(timerInterval);
      const txId = pendingVerify ? pendingVerify.txId : null;
      if (!txId) return;

      const ownerResponse = reason === 'timeout' ? 'timeout' : decision;
      const status = decision === 'approved' ? 'confirmed' : 'blocked';

      channel.postMessage({ type: 'owner-decision', txId, decision });
      channel.postMessage({ type: 'tx-update', txId, status, owner_response: ownerResponse });

      document.getElementById('modalBackdrop').classList.remove('active');
      pendingVerify = null;
    }

    function resetPage() {
      currentTxId = null;
      document.getElementById('checkout').style.display = '';
      document.getElementById('stateSuccess').classList.remove('active');
      document.getElementById('successMeta').textContent = '';
    }

    channel.onmessage = (e) => {
      const { type } = e.data;
      if (type === 'verify-request') {
        showModal(e.data);
      }
      if (type === 'reset-all') {
        clearInterval(timerInterval);
        document.getElementById('modalBackdrop').classList.remove('active');
        pendingVerify = null;
        resetPage();
      }
    };
  </script>
</body>
</html>
